<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Meridian — RM Workspace</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;750;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --navy:#0f2c44; --navy-700:#143a5a; --navy-600:#1c4a72;
  --accent:#2f80b4; --accent-soft:#e7f1f8;
  --ink:#16222e; --muted:#5d6b78; --faint:#8a97a3;
  --line:#e4e9ef; --line-soft:#eef2f6; --bg:#f4f6f9; --card:#ffffff;
  --red:#d1485b; --red-bg:#fbe9ec; --amber:#d99311; --amber-bg:#fbf2dd;
  --green:#2e9d6b; --green-bg:#e3f4ec; --blue-bg:#e7f1f8;
  --ai:#7b5cff; --ai-bg:#f0ecff; --ai-line:#ddd3ff;
  --shadow:0 1px 2px rgba(16,40,68,.06),0 4px 16px rgba(16,40,68,.06);
  --shadow-lg:0 12px 40px rgba(16,40,68,.16);
  --radius:12px; --radius-sm:8px;
  --sidebar:248px;
  --font:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:var(--font);color:var(--ink);background:var(--bg);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none}
h1,h2,h3,h4{margin:0;font-weight:650;letter-spacing:-.01em}
::selection{background:var(--accent-soft)}
svg:not([width]){width:18px;height:18px;flex:none}
.ch svg:not([width]){color:var(--accent)}
.ns svg{width:13px;height:13px;vertical-align:-2px}
.ai-block .src svg:not([width]){width:14px;height:14px}
.crumb svg{vertical-align:-2px}

/* layout */
.app{display:flex;min-height:100vh}
.sidebar{width:var(--sidebar);background:var(--navy);color:#cdd9e3;position:fixed;top:0;bottom:0;left:0;display:flex;flex-direction:column;z-index:30}
.sidebar .brand{padding:22px 22px 18px;display:flex;align-items:center;gap:11px;border-bottom:1px solid rgba(255,255,255,.08)}
.brand .logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--accent),#5aa6d6);display:grid;place-items:center;color:#fff;font-weight:800;font-size:16px}
.brand .bt{color:#fff;font-weight:700;font-size:15px;line-height:1.15}
.brand .bs{color:#8fa6b8;font-size:11px;letter-spacing:.04em;text-transform:uppercase}
.nav{padding:12px 12px;overflow-y:auto;flex:1}
.nav .grp{color:#6f879a;font-size:10.5px;letter-spacing:.09em;text-transform:uppercase;padding:14px 12px 6px;font-weight:700}
.nav a{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:9px;color:#c2d0db;font-weight:550;margin-bottom:2px;transition:.12s;font-size:13.5px}
.nav a:hover{background:rgba(255,255,255,.06);color:#fff}
.nav a.active{background:var(--accent);color:#fff;box-shadow:0 2px 10px rgba(47,128,180,.45)}
.nav a svg{width:18px;height:18px;flex:none;opacity:.9}
.nav a .badge{margin-left:auto;background:var(--red);color:#fff;font-size:10.5px;font-weight:700;padding:1px 7px;border-radius:20px}
.sidebar .me{padding:14px 18px;border-top:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:11px}
.me .av{width:34px;height:34px;border-radius:50%;background:#27567c;color:#fff;display:grid;place-items:center;font-weight:700;font-size:13px}
.me .mn{color:#fff;font-weight:600;font-size:13px}
.me .mr{color:#8fa6b8;font-size:11.5px}

.main{margin-left:var(--sidebar);flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{height:62px;background:rgba(255,255,255,.85);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:16px;padding:0 30px}
.topbar .crumb{color:var(--muted);font-size:13px}
.topbar .crumb b{color:var(--ink);font-weight:650}
.search{margin-left:auto;position:relative;width:300px}
.search input{width:100%;height:38px;border:1px solid var(--line);border-radius:9px;padding:0 12px 0 36px;font-size:13px;background:#fff;outline:none;transition:.15s}
.search input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.search svg{position:absolute;left:11px;top:10px;width:16px;height:16px;color:var(--faint)}
.search .results{position:absolute;top:44px;left:0;right:0;background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:var(--shadow-lg);overflow:hidden;display:none}
.search .results.open{display:block}
.search .results a{display:flex;align-items:center;gap:10px;padding:10px 13px;border-bottom:1px solid var(--line-soft)}
.search .results a:last-child{border:0}
.search .results a:hover{background:var(--bg)}
.topbar .bell{width:38px;height:38px;border-radius:9px;border:1px solid var(--line);display:grid;place-items:center;color:var(--muted);position:relative}
.topbar .bell .dot{position:absolute;top:8px;right:9px;width:7px;height:7px;background:var(--red);border-radius:50%;border:2px solid #fff}

.page{padding:26px 30px 60px;max-width:1320px;width:100%}
.page-head{display:flex;align-items:flex-end;gap:16px;margin-bottom:22px}
.page-head h1{font-size:23px}
.page-head p{color:var(--muted);margin:4px 0 0;font-size:13.5px}
.page-head .actions{margin-left:auto;display:flex;gap:10px}

/* buttons */
.btn{display:inline-flex;align-items:center;gap:7px;height:38px;padding:0 15px;border-radius:9px;font-weight:600;font-size:13px;border:1px solid var(--line);background:#fff;color:var(--ink);transition:.13s}
.btn:hover{background:var(--bg)}
.btn svg{width:15px;height:15px}
.btn.primary{background:var(--navy);color:#fff;border-color:var(--navy)}
.btn.primary:hover{background:var(--navy-700)}
.btn.accent{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.accent:hover{filter:brightness(1.05)}
.btn.sm{height:31px;padding:0 11px;font-size:12px}
.btn.ai{background:var(--ai-bg);color:var(--ai);border-color:var(--ai-line)}
.btn.ai:hover{background:#e7e0ff}
.btn:disabled{opacity:.55;cursor:default}

/* cards & grid */
.grid{display:grid;gap:18px}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.card .ch{display:flex;align-items:center;gap:10px;padding:15px 18px;border-bottom:1px solid var(--line-soft)}
.card .ch h3{font-size:14.5px}
.card .ch .sub{color:var(--faint);font-size:12px}
.card .ch .right{margin-left:auto;display:flex;align-items:center;gap:8px}
.card .cb{padding:16px 18px}
.card .cb.flush{padding:0}

/* stat strip */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:22px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.stat .lab{color:var(--muted);font-size:12.5px;font-weight:550;display:flex;align-items:center;gap:7px}
.stat .val{font-size:27px;font-weight:750;margin-top:7px;letter-spacing:-.02em}
.stat .sub{font-size:12px;color:var(--faint);margin-top:3px}
.stat .ic{position:absolute;right:14px;top:14px;width:34px;height:34px;border-radius:9px;display:grid;place-items:center}
.stat.r .ic{background:var(--red-bg);color:var(--red)} .stat.a .ic{background:var(--amber-bg);color:var(--amber)}
.stat.g .ic{background:var(--green-bg);color:var(--green)} .stat.b .ic{background:var(--blue-bg);color:var(--accent)}

/* pills / status */
.pill{display:inline-flex;align-items:center;gap:6px;height:23px;padding:0 9px;border-radius:20px;font-size:11.5px;font-weight:650;white-space:nowrap}
.pill .d{width:7px;height:7px;border-radius:50%}
.pill.red{background:var(--red-bg);color:#a8293a}.pill.red .d{background:var(--red)}
.pill.amber{background:var(--amber-bg);color:#8a5d06}.pill.amber .d{background:var(--amber)}
.pill.green{background:var(--green-bg);color:#1d6f49}.pill.green .d{background:var(--green)}
.pill.blue{background:var(--blue-bg);color:#1d5a82}.pill.blue .d{background:var(--accent)}
.pill.grey{background:#eef1f4;color:#566472}.pill.grey .d{background:#9aa6b2}
.pill.ai{background:var(--ai-bg);color:var(--ai)}
.rag{width:11px;height:11px;border-radius:50%;display:inline-block;flex:none}
.rag.red{background:var(--red);box-shadow:0 0 0 3px var(--red-bg)}
.rag.amber{background:var(--amber);box-shadow:0 0 0 3px var(--amber-bg)}
.rag.green{background:var(--green);box-shadow:0 0 0 3px var(--green-bg)}

/* AI badge & blocks */
.ai-badge{display:inline-flex;align-items:center;gap:5px;background:var(--ai-bg);color:var(--ai);border:1px solid var(--ai-line);border-radius:20px;padding:2px 9px;font-size:11px;font-weight:700}
.ai-badge svg{width:12px;height:12px}
.ai-block{border:1px solid var(--ai-line);border-radius:var(--radius-sm);background:linear-gradient(180deg,#faf9ff,#fff);position:relative}
.ai-block .src{color:var(--ai);font-size:11.5px;display:flex;align-items:center;gap:6px;padding:9px 14px;border-bottom:1px solid var(--ai-line);background:var(--ai-bg);border-radius:7px 7px 0 0;font-weight:600}
.ai-block .body{padding:14px}
.ai-block .ctrl{display:flex;gap:8px;padding:10px 14px;border-top:1px solid var(--line-soft)}
.ai-tip{color:var(--faint);font-size:11.5px;margin-left:auto;align-self:center}

/* tables */
table{width:100%;border-collapse:collapse}
thead th{text-align:left;font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);font-weight:700;padding:11px 16px;border-bottom:1px solid var(--line);background:#fafbfc}
tbody td{padding:13px 16px;border-bottom:1px solid var(--line-soft);font-size:13px;vertical-align:middle}
tbody tr:last-child td{border-bottom:0}
tbody tr.click{cursor:pointer;transition:.1s}
tbody tr.click:hover{background:var(--accent-soft)}
.tnum{font-variant-numeric:tabular-nums;font-weight:600}
.tname{font-weight:650}
.tsub{color:var(--faint);font-size:12px}
.linklike{color:var(--accent);font-weight:650;cursor:pointer}
.linklike:hover{text-decoration:underline}

/* filters */
.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
.chip{height:32px;padding:0 13px;border:1px solid var(--line);background:#fff;border-radius:20px;font-size:12.5px;font-weight:600;color:var(--muted);display:inline-flex;align-items:center;gap:7px}
.chip:hover{border-color:var(--accent);color:var(--accent)}
.chip.on{background:var(--navy);color:#fff;border-color:var(--navy)}
.chip .ct{background:rgba(255,255,255,.25);border-radius:10px;padding:0 6px;font-size:11px}
.chip.on .ct{background:rgba(255,255,255,.22)}

/* todos / list rows */
.row{display:flex;align-items:center;gap:13px;padding:13px 18px;border-bottom:1px solid var(--line-soft)}
.row:last-child{border:0}
.row:hover{background:#fafbfc}
.chk{width:19px;height:19px;border:2px solid #c4cdd6;border-radius:6px;flex:none;display:grid;place-items:center;cursor:pointer;transition:.12s}
.chk.done{background:var(--green);border-color:var(--green)}
.chk svg{width:12px;height:12px;color:#fff;opacity:0}
.chk.done svg{opacity:1}
.row .tx{flex:1;min-width:0}
.row .tx .t{font-weight:600}
.row.done .tx .t{text-decoration:line-through;color:var(--faint)}
.row .tx .m{color:var(--faint);font-size:12px;margin-top:1px}
.prio{font-size:10.5px;font-weight:750;padding:2px 8px;border-radius:5px;text-transform:uppercase;letter-spacing:.03em}
.prio.high{background:var(--red-bg);color:var(--red)} .prio.med{background:var(--amber-bg);color:#8a5d06} .prio.low{background:#eef1f4;color:#6b7785}

/* news */
.news{display:flex;gap:13px;padding:14px 18px;border-bottom:1px solid var(--line-soft)}
.news:last-child{border:0}
.news .dotc{width:9px;height:9px;border-radius:50%;margin-top:6px;flex:none}
.news .nt{font-weight:650;margin-bottom:3px}
.news .ns{color:var(--muted);font-size:12.5px}
.news .nm{margin-top:7px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.tag{font-size:11px;font-weight:650;padding:2px 8px;border-radius:6px;background:var(--accent-soft);color:#1d5a82}
.tag.mkt{background:#eef1f4;color:#637282}

/* memo */
.memo{display:grid;grid-template-columns:1fr 270px;gap:20px;align-items:start}
.memo-doc{background:#fff;border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.memo-doc .mh{padding:24px 30px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#fbfcfd,#fff)}
.memo-sec{padding:22px 30px;border-bottom:1px solid var(--line-soft)}
.memo-sec:last-child{border:0}
.memo-sec .sh{display:flex;align-items:center;gap:10px;margin-bottom:11px}
.memo-sec .sh h4{font-size:14px}
.memo-sec p{margin:0 0 10px;color:#2c3a47;font-size:13.5px;line-height:1.7}
.memo-sec textarea{width:100%;min-height:120px;border:1px solid var(--accent);border-radius:8px;padding:12px;font-family:inherit;font-size:13.5px;line-height:1.7;outline:none}
.memo-side .card{position:sticky;top:78px}
.acc-flag{display:inline-flex;align-items:center;gap:5px;color:var(--green);font-size:11.5px;font-weight:700}

/* progress matrix (case tracker) */
.grp-row{border:1px solid var(--line);border-radius:var(--radius);background:#fff;box-shadow:var(--shadow);margin-bottom:14px;overflow:hidden}
.grp-head{display:flex;align-items:center;gap:13px;padding:15px 18px;cursor:pointer}
.grp-head:hover{background:#fafbfc}
.grp-head .gi{width:34px;height:34px;border-radius:9px;background:var(--accent-soft);color:var(--accent);display:grid;place-items:center;flex:none}
.grp-head .chev{margin-left:auto;color:var(--faint);transition:.2s}
.grp-head.open .chev{transform:rotate(90deg)}
.grp-body{display:none;border-top:1px solid var(--line-soft)}
.grp-body.open{display:block}
.comp-grid th,.comp-grid td{text-align:center}
.comp-grid th:first-child,.comp-grid td:first-child{text-align:left}
.cstat{display:inline-flex;flex-direction:column;align-items:center;gap:3px;font-size:10.5px;color:var(--faint);font-weight:600}

/* leads */
.kanban{display:grid;grid-template-columns:repeat(5,1fr);gap:14px}
.kcol{background:#f7f9fb;border:1px solid var(--line);border-radius:var(--radius);padding:12px;min-height:120px}
.kcol h4{font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin-bottom:11px;display:flex;align-items:center;gap:7px}
.kcard{background:#fff;border:1px solid var(--line);border-radius:9px;padding:11px;box-shadow:var(--shadow);margin-bottom:9px}
.kcard .kn{font-weight:650;font-size:13px}
.kcard .ks{color:var(--faint);font-size:11.5px;margin-top:2px}
.kcard select{margin-top:9px;width:100%;height:30px;border:1px solid var(--line);border-radius:7px;font-size:12px;padding:0 7px;color:var(--ink);background:#fff}
.upload{border:2px dashed var(--line);border-radius:var(--radius);padding:30px;text-align:center;background:#fafbfc;transition:.15s}
.upload:hover{border-color:var(--accent);background:var(--accent-soft)}
.upload .ui{width:48px;height:48px;border-radius:12px;background:var(--accent-soft);color:var(--accent);display:grid;place-items:center;margin:0 auto 12px}

/* charts */
.bars{display:flex;flex-direction:column;gap:13px}
.bar-row{display:grid;grid-template-columns:130px 1fr 70px;align-items:center;gap:12px}
.bar-row .bl{font-size:12.5px;color:var(--muted);font-weight:550}
.bar-track{height:11px;background:var(--line-soft);border-radius:20px;overflow:hidden}
.bar-fill{height:100%;border-radius:20px;background:linear-gradient(90deg,var(--accent),#5aa6d6)}
.bar-row .bv{text-align:right;font-weight:700;font-size:12.5px;font-variant-numeric:tabular-nums}
.donut-wrap{display:flex;align-items:center;gap:24px}
.legend{display:flex;flex-direction:column;gap:9px}
.legend .li{display:flex;align-items:center;gap:9px;font-size:13px}
.legend .ls{width:11px;height:11px;border-radius:3px}

/* company */
.co-head{display:flex;gap:18px;align-items:flex-start;background:#fff;border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px 24px;margin-bottom:18px}
.co-logo{width:58px;height:58px;border-radius:13px;background:linear-gradient(135deg,var(--navy),var(--navy-600));color:#fff;display:grid;place-items:center;font-weight:750;font-size:22px;flex:none}
.co-meta{display:flex;gap:26px;flex-wrap:wrap;margin-top:10px}
.co-meta .m .k{font-size:11px;color:var(--faint);text-transform:uppercase;letter-spacing:.04em;font-weight:650}
.co-meta .m .v{font-weight:650;margin-top:2px}
.kv{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line-soft);border-radius:8px;overflow:hidden}
.kv .c{background:#fff;padding:11px 14px}
.kv .c .k{font-size:11px;color:var(--faint);text-transform:uppercase;letter-spacing:.04em;font-weight:650}
.kv .c .v{font-weight:600;margin-top:3px}
.two{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.three{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}

/* assistant */
.chat{display:flex;flex-direction:column;height:calc(100vh - 180px);background:#fff;border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.chat .stream{flex:1;overflow-y:auto;padding:24px 28px;display:flex;flex-direction:column;gap:18px}
.msg{display:flex;gap:12px;max-width:80%}
.msg.u{align-self:flex-end;flex-direction:row-reverse}
.msg .ava{width:32px;height:32px;border-radius:9px;flex:none;display:grid;place-items:center;font-weight:700;font-size:12px}
.msg.a .ava{background:var(--ai-bg);color:var(--ai)}
.msg.u .ava{background:var(--navy);color:#fff}
.msg .bub{padding:13px 16px;border-radius:13px;font-size:13.5px;line-height:1.65}
.msg.a .bub{background:#f6f4ff;border:1px solid var(--ai-line);border-top-left-radius:4px}
.msg.u .bub{background:var(--navy);color:#fff;border-top-right-radius:4px}
.msg .bub h5{margin:0 0 6px;font-size:13px}
.msg .bub ul{margin:8px 0 0;padding-left:18px}
.msg .bub li{margin-bottom:4px}
.suggest{display:flex;gap:9px;flex-wrap:wrap;padding:14px 28px;border-top:1px solid var(--line-soft)}
.sg{border:1px solid var(--ai-line);background:var(--ai-bg);color:var(--ai);border-radius:20px;padding:7px 13px;font-size:12.5px;font-weight:600}
.sg:hover{background:#e7e0ff}
.chat .compose{display:flex;gap:10px;padding:14px 20px;border-top:1px solid var(--line)}
.chat .compose input{flex:1;height:42px;border:1px solid var(--line);border-radius:10px;padding:0 14px;font-size:13.5px;outline:none}
.chat .compose input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.typing{display:inline-flex;gap:4px;padding:4px 0}
.typing i{width:7px;height:7px;border-radius:50%;background:var(--ai);opacity:.4;animation:tp 1.1s infinite}
.typing i:nth-child(2){animation-delay:.2s}.typing i:nth-child(3){animation-delay:.4s}
@keyframes tp{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-4px)}}

/* misc */
.spin{width:16px;height:16px;border:2px solid var(--ai-line);border-top-color:var(--ai);border-radius:50%;display:inline-block;animation:sp .7s linear infinite;vertical-align:-3px}
@keyframes sp{to{transform:rotate(360deg)}}
.gen{display:flex;align-items:center;gap:10px;color:var(--ai);font-size:13px;font-weight:600;padding:18px}
.empty{text-align:center;color:var(--faint);padding:40px 20px}
.divider{height:1px;background:var(--line-soft);margin:18px 0}
.fade-in{animation:fi .35s ease}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.mb0{margin-bottom:0}.mt16{margin-top:16px}
.flex{display:flex;align-items:center;gap:10px}
.spread{display:flex;align-items:center;justify-content:space-between;gap:12px}
.muted{color:var(--muted)} .faint{color:var(--faint)} .right{text-align:right} .center{text-align:center}
.modal-bg{position:fixed;inset:0;background:rgba(15,44,68,.45);backdrop-filter:blur(2px);z-index:50;display:grid;place-items:center;padding:24px;animation:fi .2s}
.modal{background:#fff;border-radius:14px;box-shadow:var(--shadow-lg);width:560px;max-width:100%;max-height:88vh;overflow:auto}
.modal .mh2{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
.modal .mb2{padding:20px 22px}
.modal .mf{padding:14px 22px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px}
.x{margin-left:auto;width:30px;height:30px;border-radius:8px;display:grid;place-items:center;color:var(--muted)}
.x:hover{background:var(--bg)}

.ribbon{background:#fff8e6;color:#8a5d06;border-bottom:1px solid #f0e3c0;font-size:12px;padding:7px 30px;display:flex;gap:8px;align-items:center;line-height:1.4}
.ribbon svg{color:var(--amber);flex:none}
.co-meta .pill{height:21px}

/* ---- tabs / progressive disclosure ---- */
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--line);margin:0 0 20px;overflow-x:auto}
.tab{padding:11px 16px;font-weight:600;font-size:13.5px;color:var(--muted);border-bottom:2px solid transparent;display:flex;align-items:center;gap:7px;white-space:nowrap;cursor:pointer}
.tab:hover{color:var(--ink)}
.tab.on{color:var(--accent);border-bottom-color:var(--accent)}
.tab svg{width:16px;height:16px}
.tab .ct{background:var(--red-bg);color:var(--red);border-radius:10px;font-size:11px;padding:0 6px;font-weight:700}
.toggle{display:inline-flex;background:#eef1f4;border-radius:9px;padding:3px}
.toggle button{padding:6px 14px;border-radius:7px;font-size:12.5px;font-weight:600;color:var(--muted)}
.toggle button.on{background:#fff;color:var(--ink);box-shadow:var(--shadow)}

/* ---- tooltips ---- */
.tipw{border-bottom:1px dotted var(--faint);cursor:help}
[data-tip]{position:relative}
[data-tip]:hover::after{content:attr(data-tip);position:absolute;left:50%;bottom:calc(100% + 9px);transform:translateX(-50%);background:var(--navy);color:#fff;font-size:11.5px;font-weight:500;padding:8px 11px;border-radius:8px;width:max-content;max-width:250px;z-index:60;box-shadow:var(--shadow-lg);line-height:1.45;pointer-events:none;animation:fi .14s;white-space:normal}
[data-tip]:hover::before{content:"";position:absolute;left:50%;bottom:calc(100% + 3px);transform:translateX(-50%);border:6px solid transparent;border-top-color:var(--navy);z-index:60}

/* ---- gauges / kpis ---- */
.gauges{display:flex;gap:26px;flex-wrap:wrap}
.gauge{display:flex;flex-direction:column;align-items:center;gap:8px}
.gauge .ring{width:104px;height:104px;border-radius:50%;display:grid;place-items:center;flex:none}
.gauge .ring .in{width:74px;height:74px;background:#fff;border-radius:50%;display:grid;place-items:center;text-align:center}
.gauge .ring .in b{font-size:21px;letter-spacing:-.02em}
.gauge .lab{font-size:12px;color:var(--muted);font-weight:600}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
.kpi{background:#fff;border:1px solid var(--line);border-radius:11px;padding:14px 16px;box-shadow:var(--shadow)}
.kpi .k{font-size:11.5px;color:var(--muted);font-weight:600;display:flex;align-items:center;gap:6px}
.kpi .v{font-size:22px;font-weight:750;margin-top:6px;letter-spacing:-.02em}
.kpi .s{font-size:11.5px;color:var(--faint);margin-top:2px}
.alert-row{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid var(--line-soft)}
.alert-row:last-child{border:0}
.alert-ic{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;flex:none}

/* ---- tour ---- */
.tour-ring{position:fixed;z-index:81;border-radius:11px;box-shadow:0 0 0 3px var(--accent),0 0 0 9999px rgba(15,44,68,.55);transition:top .25s,left .25s,width .25s,height .25s;pointer-events:none}
.tour-pop{position:fixed;z-index:82;background:#fff;border-radius:13px;box-shadow:var(--shadow-lg);width:326px;padding:17px 19px;animation:fi .2s}
.tour-pop h4{font-size:15px;margin-bottom:7px;display:flex;align-items:center;gap:8px}
.tour-pop h4 svg{width:16px;height:16px;color:var(--ai)}
.tour-pop p{font-size:13px;color:var(--muted);margin:0 0 15px;line-height:1.55}
.tour-pop .nav{display:flex;align-items:center;gap:8px}
.tour-pop .step{font-size:11.5px;color:var(--faint);margin-right:auto;font-weight:600}
.toast{position:fixed;right:26px;bottom:26px;z-index:70;background:#fff;border:1px solid var(--line);border-radius:13px;box-shadow:var(--shadow-lg);padding:16px 18px;width:312px;animation:fi .3s}
.toast h4{font-size:14.5px;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.toast h4 svg{width:16px;height:16px;color:var(--ai)}
.toast p{font-size:12.5px;color:var(--muted);margin:0 0 13px;line-height:1.5}
.toast .row{display:flex;gap:8px}

/* ---- watchlist ---- */
.wl-sev{width:5px;height:34px;border-radius:6px;display:inline-block}
.sig{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;padding:2px 9px;border-radius:6px;margin:2px 4px 2px 0}
.sig.red{background:var(--red-bg);color:#a8293a}.sig.amber{background:var(--amber-bg);color:#8a5d06}
.help-btn{height:38px;padding:0 12px;border:1px solid var(--line);border-radius:9px;display:flex;align-items:center;gap:7px;color:var(--muted);font-weight:600;font-size:12.5px}
.help-btn:hover{border-color:var(--ai-line);color:var(--ai);background:var(--ai-bg)}
.help-btn svg{width:15px;height:15px}

/* ---- responsive / mobile ---- */
.menu-btn{display:none;width:38px;height:38px;border:1px solid var(--line);border-radius:9px;align-items:center;justify-content:center;color:var(--ink);background:#fff;flex:none}
.menu-btn svg{width:18px;height:18px}
.nav-overlay{display:none}
@media (max-width:980px){
  .stats{grid-template-columns:repeat(2,1fr)}
  .kpis{grid-template-columns:repeat(2,1fr)}
  .three{grid-template-columns:1fr 1fr}
}

  .nav-overlay{position:fixed;inset:0;background:rgba(15,44,68,.45);z-index:35}

  .main{margin-left:0}
  .menu-btn{display:flex}
  .topbar{padding:0 16px;gap:10px}
  .crumb{display:none}
  .search{width:auto;flex:1;margin-left:0}
  .page{padding:18px 16px 64px}
  .two,.three,.memo{grid-template-columns:1fr}
  .kanban{grid-template-columns:1fr 1fr}
  .gauges{gap:18px;justify-content:space-around}
  .memo-side .card{position:static}
  .page-head{flex-wrap:wrap}
  .page-head .actions{margin-left:0}
  .co-head{flex-direction:column}
  .card .cb.flush{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .card .cb.flush table{min-width:620px}
  .tabs{margin-bottom:16px}
  .tour-pop{width:calc(100vw - 24px);max-width:326px}
  .toast{left:16px;right:16px;width:auto}
}
@media (max-width:560px){
  .stats,.kpis,.kanban{grid-template-columns:1fr}
  .ribbon{font-size:11px;padding:7px 16px}
  .page-head h1{font-size:20px}
  .search{display:none}
  .help-btn span{display:none}
  .help-btn{padding:0 11px}
}

/* ---- command palette ---- */
.cmdk-bg{position:fixed;inset:0;background:rgba(15,44,68,.4);backdrop-filter:blur(3px);z-index:90;display:flex;justify-content:center;align-items:flex-start;padding:12vh 16px 16px;animation:fi .12s}
.cmdk{width:620px;max-width:100%;background:#fff;border-radius:14px;box-shadow:var(--shadow-lg);overflow:hidden;animation:fi .15s}
.cmdk .cin{display:flex;align-items:center;gap:11px;padding:15px 17px;border-bottom:1px solid var(--line)}

.cmdk .cin input{flex:1;border:none;outline:none;font-size:15.5px;font-family:inherit;color:var(--ink);background:none}
.cmdk .list{max-height:56vh;overflow:auto;padding:8px}
.cmdk .grp{font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--faint);font-weight:700;padding:11px 10px 4px}
.cmdk .it{display:flex;align-items:center;gap:12px;padding:9px 10px;border-radius:9px;cursor:pointer}
.cmdk .it.sel{background:var(--accent-soft)}
.cmdk .it .cic{width:30px;height:30px;border-radius:8px;background:#eef1f4;display:grid;place-items:center;color:var(--muted);flex:none}
.cmdk .it .cic svg{width:15px;height:15px}
.cmdk .it .ctx{flex:1;min-width:0}
.cmdk .it .ct{font-weight:600;font-size:13.5px}
.cmdk .it .cs{font-size:12px;color:var(--faint)}
.cmdk .foot{display:flex;gap:14px;padding:9px 15px;border-top:1px solid var(--line-soft);color:var(--faint);font-size:11.5px}
kbd{font-family:inherit;font-size:11px;color:var(--muted);border:1px solid var(--line);border-radius:5px;padding:1px 6px;background:#fafbfc;box-shadow:0 1px 0 var(--line)}
.search .kbd-hint{position:absolute;right:10px;top:9px;pointer-events:none}

/* ---- next-best-action ---- */
.nba{display:flex;gap:12px;padding:13px 16px;border-bottom:1px solid var(--line-soft);align-items:flex-start}
.nba:last-child{border:0}
.nba .nic{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;flex:none}
.nba .ntx{flex:1;min-width:0}
.nba .nt{font-weight:650;font-size:13.5px}
.nba .ns{font-size:12.5px;color:var(--muted);margin-top:2px}
.nba .act{display:flex;gap:7px;margin-top:8px;flex-wrap:wrap}

/* ---- activity timeline / quick actions ---- */
.qa-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:2px}
.tl{position:relative;padding-left:6px}
.tl-item{display:flex;gap:12px;padding:11px 0;border-bottom:1px solid var(--line-soft)}
.tl-item:last-child{border:0}
.tl-ic{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;flex:none;background:#eef1f4;color:var(--muted)}
.tl-ic svg{width:15px;height:15px}
.tl-tx{flex:1;min-width:0}
.tl-tx .tt{font-weight:600;font-size:13px}
.tl-tx .tm{font-size:12px;color:var(--faint);margin-top:1px}
.field{width:100%;border:1px solid var(--line);border-radius:9px;padding:10px 12px;font-family:inherit;font-size:13.5px;outline:none;margin-top:8px}
.field:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}

    users:'<circle cx="9" cy="8" r="3"/><path d="M3 20c0-3 3-5 6-5s6 2 6 5"/><path d="M16 6a3 3 0 0 1 0 6"/>',

    money:'<rect x="3" y="6" width="18" height="12" rx="2"/><circle cx="12" cy="12" r="2.5"/>',
  };
  const icon = (n, w) => `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"${w?` width="${w}" height="${w}"`:''}>${P[n]||''}</svg>`;
  const spark = `<svg viewBox="0 0 24 24" fill="currentColor">${P.spark}</svg>`;

  /* ---------- small components ---------- */
  const aiBadge = (txt) => `<span class="ai-badge">${spark}${txt||'AI'}</span>`;
  const rag = (r) => `<span class="rag ${r}"></span>`;
  const ragWord = {red:"Action needed", amber:"Monitor", green:"On track"};
  const pill = (t,k) => `<span class="pill ${k}"><span class="d"></span>${t}</span>`;
  const initials = (c) => c.short;

  const statusPill = (s) => {
    const map = {"Submitted":"grey","In Progress":"blue","Pending Docs":"amber","Completed":"green",
      "Requested":"blue","Under Review":"amber","Cleared":"green","Rejected":"red"};
    return pill(s, map[s]||"grey");
  };
  const compState = {done:{r:"green",l:"Done"},review:{r:"amber",l:"In review"},progress:{r:"amber",l:"Drafting"},pending:{r:"red",l:"Pending"}};

  const aiBlock = (key, src, bodyHtml, opts={}) => {
    const acc = ui.accepted[key];
    return `<div class="ai-block" data-block="${key}">
      <div class="src">${spark} ${src}</div>
      <div class="body">${bodyHtml}</div>
      <div class="ctrl">
        ${acc ? `<span class="acc-flag">${icon('check',14)} Accepted by RM</span>`
              : `<button class="btn sm ai" data-act="accept" data-key="${key}">${icon('check',14)} Accept</button>`}
        <button class="btn sm" data-act="edit" data-key="${key}">${icon('edit',14)} Edit</button>
        <button class="btn sm" data-act="regen" data-key="${key}">${icon('refresh',14)} Regenerate</button>
        <span class="ai-tip">AI-drafted · RM reviews & approves</span>
      </div>
    </div>`;
  };

  /* ---------- nav + shell ---------- */
  const atRisk = DB.requests.filter(r=>r.atRisk && r.status!=="Completed").length;
  const NAV = [
    {g:"Workspace"},
    {id:"dashboard", label:"Daily Dashboard", icon:"home"},
    {id:"analytics", label:"Portfolio Analytics", icon:"chart"},
    {g:"Pipeline"},
    {id:"requests", label:"Request Tracker", icon:"inbox", badge:atRisk},
    {id:"cases", label:"Case Tracker", icon:"layers"},
    {id:"leads", label:"Leads", icon:"target"},
    {id:"watchlist", label:"Watchlist", icon:"alert", badge:watchCount()},
    {g:"Assist"},
    {id:"assistant", label:"RM Assistant", icon:"spark"},
  ];

  function shell() {
    const nav = NAV.map(n => n.g
      ? `<div class="grp">${n.g}</div>`
      : `<a href="#/${n.id}" data-nav="${n.id}">${icon(n.icon)}<span>${n.label}</span>${n.badge?`<span class="badge">${n.badge}</span>`:''}</a>`
    ).join("");
    document.body.innerHTML = `
    <div class="app">
      <aside class="sidebar">
        <div class="brand"><div class="logo">RM</div>
          <div><div class="bt">Meridian</div><div class="bs">RM Workspace</div></div></div>
        <nav class="nav">${nav}</nav>
        <div class="me"><div class="av">${DB.rm.initials}</div>
          <div><div class="mn">${DB.rm.name}</div><div class="mr">Relationship Manager</div></div></div>
      </aside>
      <div class="nav-overlay" data-act="menu"></div>
      <div class="main">
        <div class="topbar">
          <button class="menu-btn" data-act="menu">${icon('menu')}</button>
          <div class="crumb" id="crumb"></div>
          <div class="search">
            ${icon('search')}
            <input id="gsearch" placeholder="Search clients, groups, CR numbers…" autocomplete="off"/>
            <span class="kbd-hint" data-act="cmd-open"><kbd>⌘K</kbd></span>
            <div class="results" id="sresults"></div>
          </div>
          <button class="help-btn" data-act="tour-start">${icon('spark')} Tour</button>
          <button class="bell">${icon('bell')}<span class="dot"></span></button>
        </div>
        <div class="ribbon">${icon('alert',13)} <span>${DB.disclaimer}</span></div>
        <div id="view"></div>
      </div>
    </div>`;
    const inp = $("#gsearch");
    inp.addEventListener("input", onSearch);
    inp.addEventListener("focus", onSearch);
    document.addEventListener("click", (e)=>{ if(!e.target.closest(".search")) $("#sresults").classList.remove("open"); });
  }

  function onSearch(e){
    const q = $("#gsearch").value.trim().toLowerCase();
    const box = $("#sresults");
    if(!q){ box.classList.remove("open"); box.innerHTML=""; return; }
    const hits = DB.companies.filter(c =>
      c.name.toLowerCase().includes(q) || (c.group||"").toLowerCase().includes(q) || c.cr.toLowerCase().includes(q)
    ).slice(0,6);
    box.innerHTML = hits.length ? hits.map(c=>
      `<a href="#/company/${c.id}"><span class="rag ${c.rag}"></span><div><div class="tname">${c.name}</div>
       <div class="tsub">${c.group||"Standalone"} · ${c.cr}</div></div></a>`).join("")
      : `<div style="padding:14px 13px" class="faint">No matches</div>`;
    box.classList.add("open");
  }

  /* ---------- router ---------- */
  const routes = {
    dashboard: pageDashboard, analytics: pageAnalytics, requests: pageRequests,
    cases: pageCases, leads: pageLeads, assistant: pageAssistant,
    company: pageCompany, memo: pageMemo, watchlist: pageWatchlist,
  };
  function parse(){
    const h = (location.hash||"#/dashboard").replace(/^#\//,"");
    const [name, param] = h.split("/");
    return { name: routes[name]?name:"dashboard", param };
  }
  function setCrumb(parts){ $("#crumb").innerHTML = parts.map((p,i)=> i===parts.length-1?`<b>${p}</b>`:p).join(" / "); }
  function setActive(name){ document.querySelectorAll("[data-nav]").forEach(a=>a.classList.toggle("active", a.dataset.nav===name)); }

  function render(){
    closeModal();
    const {name, param} = parse();
    setActive(name);
    const view = $("#view");
    view.innerHTML = `<div class="page fade-in">${routes[name](param)}</div>`;
    window.scrollTo(0,0);
    if(name==="assistant") mountAssistant();
    const tt=document.getElementById('ttoast'); if(tt) tt.remove();
    if(ui.tour && ui.tour.open) tourRender();
    else if(name==="dashboard") showTourToast();
  }

  /* ========== PAGE 1 — DASHBOARD ========== */

    const pnba = portfolioNBA();
    const urgent = DB.companies.filter(c=>c.rag==="red").length;

      ${statCard("Open requests", openReq, atRisk+" at risk of delay", "inbox","b")}
      ${statCard("Memos in progress", pendingMemo, "across your portfolio", "file","a")}
      ${statCard("Total exposure", fmt(portfolio), DB.companies.length+" clients · "+Object.keys(DB.groups).length+" groups", "money","g")}
    </div>`;

    const todos = DB.todos.map(t=>{
      const c = t.companyId?DB.byId[t.companyId]:null;
      return `<div class="row ${t.done?'done':''}" data-act="todo" data-id="${t.id}">
        <div class="chk ${t.done?'done':''}">${icon('check',12)}</div>
        <div class="tx"><div class="t">${t.text}</div><div class="m">${t.meta}</div></div>
        <span class="prio ${t.prio}">${t.prio}</span>
      </div>`;}).join("");

    const feed = DB.feed.map(n=>{
      const c = n.companyId?DB.byId[n.companyId]:null;
      return `<div class="news">
        <span class="dotc" style="background:var(--${n.rag==='red'?'red':n.rag==='amber'?'amber':'green'})"></span>
        <div style="flex:1">
          <div class="nt">${n.t}</div>
          <div class="ns">${spark2()} ${n.s}</div>
          <div class="nm">${c?`<a class="tag" href="#/company/${c.id}">${c.name}</a>`:`<span class="tag mkt">Market</span>`}
            <span class="faint" style="font-size:11.5px">${n.time}</span></div>
        </div></div>`;}).join("");

    const clients = DB.companies.map(c=>`
      <tr class="click" data-href="#/company/${c.id}">
        <td><span class="rag ${c.rag}" title="${ragWord[c.rag]}"></span></td>
        <td><div class="tname">${c.name}</div><div class="tsub">${c.group||"Standalone"} · ${c.sector}</div></td>
        <td class="tnum">${fmt(c.funded+c.nonfunded)}</td>
        <td>${pill(c.rating.split(" ")[0]+" · "+c.rating.split(" ").slice(1).join(" ").replace(/[()]/g,''), "grey")}</td>
        <td class="muted" style="font-size:12.5px">${c.ragReason}</td>
      </tr>`).join("");

    return `
    <div class="page-head"><div>
      <h1>Good morning, ${DB.rm.name.split(" ")[0]}</h1>
      <p>Here's what your AI assistant prepared for you this morning — ${new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'})}.</p>
    </div><div class="actions"><a class="btn ai" href="#/assistant">${spark} Ask the assistant</a></div></div>
    ${stats}
    <div class="grid" style="grid-template-columns:1fr 1fr">
      <div class="card">
        <div class="ch">${spark2()}<h3>Today — recommended actions</h3>${aiBadge('AI-prioritised')}
          <div class="right"><span class="pill red"><span class="d"></span>${pnba.filter(x=>x.it.sev==='red').length} urgent</span></div></div>
        <div class="cb flush">${pnba.slice(0,6).map(({c,it})=>nbaRowHTML(it,c,true)).join("")||'<div class="empty">All clear — nothing needs action.</div>'}</div>
      </div>
      <div class="card">
        <div class="ch">${icon('bell')}<h3>News & client signals</h3>${aiBadge('AI-summarised')}</div>
        <div class="cb flush" style="max-height:430px;overflow:auto">${feed}</div>
      </div>
    </div>
    <div class="card" style="margin-top:18px">
      <div class="ch">${icon('users')}<h3>My portfolio</h3>

        <tbody>${clients}</tbody></table></div>
    </div>`;
  }

  function statCard(lab,val,sub,ic,cls){
    return `<div class="stat ${cls}"><div class="lab">${lab}</div><div class="val">${val}</div>
      <div class="sub">${sub}</div><div class="ic">${icon(ic,18)}</div></div>`;
  }

  /* ========== PAGE 2 — ANALYTICS ========== */
  let aFilter = "all";
  function pageAnalytics(){
    setCrumb(["Meridian","Portfolio Analytics"]);
    const cos = DB.companies;
    const totalFunded = cos.reduce((a,c)=>a+c.funded,0);
    const totalNon = cos.reduce((a,c)=>a+c.nonfunded,0);
    const total = totalFunded+totalNon;
    const limit = cos.reduce((a,c)=>a+c.limit,0);
    // by sector
    const sectors = {};
    cos.forEach(c=>sectors[c.sector]=(sectors[c.sector]||0)+c.funded+c.nonfunded);
    const sectorRows = Object.entries(sectors).sort((a,b)=>b[1]-a[1]);
    const maxSec = Math.max(...sectorRows.map(r=>r[1]));
    // by group
    const grp = {};
    cos.forEach(c=>{const k=c.group||"Standalone";grp[k]=(grp[k]||0)+c.funded+c.nonfunded;});
    const grpRows = Object.entries(grp).sort((a,b)=>b[1]-a[1]);
    const maxG = Math.max(...grpRows.map(r=>r[1]));
    // RAG
    const ragc = {red:0,amber:0,green:0}; cos.forEach(c=>ragc[c.rag]++);
    // top exposures
    const top = [...cos].sort((a,b)=>(b.funded+b.nonfunded)-(a.funded+a.nonfunded)).slice(0,6);

    const bar = (label,val,max)=>`<div class="bar-row"><div class="bl">${label}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.round(val/max*100)}%"></div></div>
      <div class="bv">${fmt(val)}</div></div>`;

    const donut = (()=>{
      const segs=[["green",ragc.green,"var(--green)"],["amber",ragc.amber,"var(--amber)"],["red",ragc.red,"var(--red)"]];
      const tot=cos.length; let acc=0; const stops=segs.map(([k,v,col])=>{const s=acc/tot*360;acc+=v;const e=acc/tot*360;return `${col} ${s}deg ${e}deg`;}).join(",");
      return `<div class="donut-wrap">
        <div style="width:128px;height:128px;border-radius:50%;background:conic-gradient(${stops});position:relative">
          <div style="position:absolute;inset:18px;background:#fff;border-radius:50%;display:grid;place-items:center;text-align:center">
            <div><div style="font-size:24px;font-weight:750">${cos.length}</div><div class="faint" style="font-size:11px">clients</div></div></div></div>
        <div class="legend">
          <div class="li"><span class="ls" style="background:var(--green)"></span>On track — ${ragc.green}</div>
          <div class="li"><span class="ls" style="background:var(--amber)"></span>Monitor — ${ragc.amber}</div>
          <div class="li"><span class="ls" style="background:var(--red)"></span>Action needed — ${ragc.red}</div>
        </div></div>`;
    })();

    return `
    <div class="page-head"><div><h1>Portfolio Analytics</h1>
      <p>Exposure, concentration and risk health across your book — refreshed automatically.</p></div>
      <div class="actions">${aiBadge('Live from portfolio data')}</div></div>
    <div class="stats">
      ${statCard("Total exposure", fmt(total), `Utilisation ${Math.round(total/limit*100)}% of limits`, "money","b")}
      ${statCard("Funded", fmt(totalFunded), `${Math.round(totalFunded/total*100)}% of book`, "chart","g")}
      ${statCard("Non-funded", fmt(totalNon), `${Math.round(totalNon/total*100)}% of book`, "layers","a")}
      ${statCard("Approved limits", fmt(limit), `Headroom ${fmt(limit-total)}`, "sliders","b")}
    </div>
    <div class="two">
      <div class="card"><div class="ch">${icon('chart')}<h3>Exposure by sector</h3></div>
        <div class="cb"><div class="bars">${sectorRows.map(([s,v])=>bar(s,v,maxSec)).join("")}</div></div></div>
      <div class="card"><div class="ch">${icon('layers')}<h3>Exposure by group</h3></div>
        <div class="cb"><div class="bars">${grpRows.map(([s,v])=>bar(s,v,maxG)).join("")}</div></div></div>
    </div>
    <div class="two" style="margin-top:18px;grid-template-columns:340px 1fr">
      <div class="card"><div class="ch">${icon('target')}<h3>Portfolio health</h3></div>
        <div class="cb">${donut}</div></div>
      <div class="card"><div class="ch">${icon('building')}<h3>Top exposures</h3></div>
        <div class="cb flush"><table><thead><tr><th>Client</th><th>Group</th><th class="right">Funded</th><th class="right">Total</th><th>Status</th></tr></thead>
        <tbody>${top.map(c=>`<tr class="click" data-href="#/company/${c.id}">
          <td class="tname">${c.name}</td><td class="muted">${c.group||"Standalone"}</td>
          <td class="right tnum">${fmt(c.funded)}</td><td class="right tnum">${fmt(c.funded+c.nonfunded)}</td>
          <td>${rag(c.rag)} <span class="faint" style="font-size:12px">${ragWord[c.rag]}</span></td></tr>`).join("")}</tbody></table></div></div>
    </div>`;
  }

    </div>
    <div class="card"><div class="ch">${icon('inbox')}<h3>Requests</h3>
      <div class="right"><span class="pill red"><span class="d"></span>${atRisk} flagged at risk</span>${aiBadge('AI risk-scored')}</div></div>
      <div class="cb flush"><table>
        <thead><tr><th>Reference</th><th>Client</th><th>Type</th><th>Owner (coordination)</th><th>Status</th><th>AI flag</th><th></th></tr></thead>
        <tbody>${table}</tbody></table></div></div>`;
  }

  /* ========== PAGE 4 — CASE TRACKER ========== */
  function pageCases(){

    const compLab = {dcr:"Credit Memo",risk:"Risk Assessment",cinet:"CINET",presentation:"Presentation",spreading:"Fin. Spreading"};

    return `

      <div class="actions">${aiBadge('AI assembles each package')}</div></div>
    <div class="toolbar"><span class="faint" style="font-size:12.5px">${icon('chart',14)} Click a group to expand its companies. Each dot shows a committee component's status.</span></div>
    ${groupHtml}`;

      {key:"overview", title:"1. Borrower Overview", src:"Drafted from client master file + group structure",

  function drawChat(){
    const s=$("#stream"); if(!s) return;
    s.innerHTML = ui.chat.map(m=>`<div class="msg ${m.role}">
      <div class="ava">${m.role==='a'?spark:DB.rm.initials}</div>
      <div class="bub">${m.html}</div></div>`).join("") +
      (ui.chatBusy?`<div class="msg a"><div class="ava">${spark}</div><div class="bub"><div class="typing"><i></i><i></i><i></i></div></div></div>`:'');
    s.scrollTop=s.scrollHeight;
  }
  function ask(i){ const x=QA[i]; sendChat(x.q, x.a); }
  function sendChat(q, cannedHtml){
    q=(q||"").trim(); if(!q||ui.chatBusy) return;
    const inp=$("#chatin"); if(inp) inp.value="";
    ui.chat.push({role:"u", html:q});
    let ans = cannedHtml;
    if(!ans){
      const hit = QA.find(x=>x.q.toLowerCase()===q.toLowerCase());
      ans = hit?hit.a:`Here's what I can see for that. For this demo I respond in full to the suggested questions below — try one of those to see a complete, sourced answer.`;
    }
    ui.chatBusy=true; drawChat();
    setTimeout(()=>{ ui.chatBusy=false; ui.chat.push({role:"a", html:ans}); drawChat(); }, 950);
  }

    const kyc = `<div class="card"><div class="ch">${icon('users')}<h3>KYC</h3></div><div class="cb">

    return kpis + nbaCard(c) + aiBlock("co_"+c.id, "AI briefing · summarised from filings, financials & news",
      `<p style="margin:0">${c.name} is a ${c.rating.toLowerCase().includes('strong')?'strong':c.rag==='red'?'closely-watched':'satisfactory'} ${c.sector.toLowerCase()} name, banking with us since ${c.since}. Our exposure is ${fmt(c.exposure.total.util)} (${Math.round(c.market.share*100)}% of an estimated ${fmt(c.market.total.util)} total market exposure). ${c.ragReason} FY2025 relationship income ${kwdm(c.income['2025'].total)} at ${c.rorwa} RoRWA.</p>`)
      + `<div class="two" style="margin-top:18px">${attnCard}${pubCard||kyc}</div>` + (pubCard?`<div class="two" style="margin-top:18px">${kyc}</div>`:'');

          <div class="spread" style="margin-top:8px"><span class="faint" style="font-size:12px">Secured exposure ${fmt(col.secured)}</span><span class="faint" style="font-size:12px">Collateral value ${fmt(col.items.reduce((a,i)=>a+i.value,0))}</span></div>

          <div class="bar-track" style="height:14px"><div class="bar-fill" style="width:${Math.min(100, pct(c.exposure.total.util, c.exposure.total.limit))}%"></div></div>

  function coCovenants(c){
    const cov = c.covenants.map(v=>`<tr><td class="tname">${v.name}</td><td class="muted">${v.req}</td><td class="tnum">${v.actual}</td><td>${covPill(v.status)}</td></tr>`).join("");

    const news = c.news.length?c.news.map(n=>`<div class="news" style="padding:14px 0">
      <span class="dotc" style="background:var(--${n.rag==='red'?'red':n.rag==='amber'?'amber':'green'})"></span>
      <div><div class="nt">${n.t}</div><div class="ns">${spark2()} ${n.s}</div>

  /* ========== WATCHLIST ========== */
  function watchSignals(c){
    const sig=[];
    if(c.covenants.some(v=>v.status==="breach")) sig.push({t:"Covenant breach",sev:"red"});
    else if(c.covenants.some(v=>v.status==="watch")) sig.push({t:"Covenant watch",sev:"amber"});
    if(c.documents.some(d=>d.status==="overdue")) sig.push({t:"Document overdue",sev:"red"});
    if(c.collateral.coverage<100) sig.push({t:"Collateral cover <100%",sev:"amber"});
    if(DB.requests.some(r=>r.companyId===c.id&&r.atRisk&&r.status!=="Completed")) sig.push({t:"At-risk request",sev:"red"});
    if(c.rag==="red"&&!sig.length) sig.push({t:"Watch rating",sev:"red"});
    return sig;
  }
  function watchCount(){ return DB.companies.filter(c=>watchSignals(c).some(s=>s.sev==="red")).length; }
  function pageWatchlist(){
    setCrumb(["Meridian","Watchlist"]);
    const rows = DB.companies.map(c=>({c,sig:watchSignals(c)})).filter(x=>x.sig.length)
      .sort((a,b)=>(b.sig.some(s=>s.sev==='red')?1:0)-(a.sig.some(s=>s.sev==='red')?1:0));
    const red=rows.filter(r=>r.sig.some(s=>s.sev==='red')).length;
    const body = rows.map(({c,sig})=>{ const sev=sig.some(s=>s.sev==='red')?'red':'amber';
      return `<tr class="click" data-href="#/company/${c.id}">
        <td style="width:10px"><span class="wl-sev" style="background:var(--${sev})"></span></td>
        <td><div class="tname">${c.name}</div><div class="tsub">${c.group||'Standalone'} · ${c.sector}</div></td>
        <td>${sig.map(s=>`<span class="sig ${s.sev}">${s.t}</span>`).join("")}</td>
        <td class="right tnum">${fmt(c.exposure.total.util)}</td>
        <td>${pill(ragWord[c.rag],c.rag)}</td></tr>`; }).join("");
    return `<div class="page-head"><div><h1>Watchlist & early warning</h1>
      <p>Clients showing covenant, document, collateral or service signals — sorted by severity.</p></div>
      <div class="actions"><span class="pill red"><span class="d"></span>${red} need action</span>${aiBadge('Auto-flagged')}</div></div>
      <div class="card"><div class="cb flush"><table>
        <thead><tr><th></th><th>Client</th><th>Signals</th><th class="right">Our exposure</th><th>Status</th></tr></thead>
        <tbody>${body||'<tr><td colspan="5"><div class="empty">Nothing on the watchlist.</div></td></tr>'}</tbody></table></div></div>`;
  }

  /* ========== GUIDED TOUR ========== */
  const TOUR=[
    {route:"#/dashboard", sel:".stats", title:"Your morning snapshot", text:"Urgent clients, open requests, memos in progress and total exposure — refreshed for you each morning."},
    {route:"#/dashboard", sel:"#view .grid .card", title:"The AI did the prep", text:"Your to-do list and the news feed are auto-generated and summarised. You review finished work — you don't assemble it."},
    {route:"#/dashboard", sel:"[data-nav='requests']", title:"Stop chasing the ops team", text:"Every request you sent to coordination, tracked end-to-end with AI 'at-risk' flags and ready-to-send follow-ups."},
    {route:"#/company/kipco", coTab:"exposure", sel:"[data-tour='exposure']", title:"Our exposure vs the market", text:"Cash and non-cash limits and utilisation for our book, next to the client's total market exposure from CINET — and your share of wallet."},
    {route:"#/company/kipco", coTab:"profit", sel:"[data-tour='profit']", title:"Is the relationship worth it?", text:"Income the client generates — interest, FX, liability, LC/LG commission and fees — by year, for the company or the whole group."},
    {route:"#/memo/cgc", sel:".memo-doc", title:"The finished credit memo", text:"AI assembles the committee memo from filings, financials and CINET. You accept, edit or regenerate — nothing is final until you approve."},
  ];
  function startTour(){ ui.tourSeen=true; ui.tour={open:true,step:0}; render(); }
  function endTour(){ ui.tour={open:false,step:0}; ui.tourSeen=true; document.querySelectorAll('.tour-ring,.tour-pop').forEach(e=>e.remove()); }
  function tourGo(d){ const n=(ui.tour.step||0)+d; if(n<0)return; if(n>=TOUR.length){endTour();return;} ui.tour.step=n; render(); }
  function tourRender(){
    const st=TOUR[ui.tour.step]; if(!st) return;
    if(st.coTab) ui.coTab=st.coTab;
    const needNav = location.hash!==st.route;
    if(needNav){ location.hash=st.route; }
    setTimeout(()=>{
      if(!ui.tour.open) return;
      document.querySelectorAll('.tour-ring,.tour-pop').forEach(e=>e.remove());
      const el=document.querySelector(st.sel);
      if(el) el.scrollIntoView({block:'center',behavior:'smooth'});
      setTimeout(()=>{
        if(!ui.tour.open) return;
        const r=el?el.getBoundingClientRect():{top:140,left:320,width:420,height:120};
        const pad=6, ring=document.createElement('div'); ring.className='tour-ring';
        ring.style.top=(r.top-pad)+'px'; ring.style.left=(r.left-pad)+'px'; ring.style.width=(r.width+pad*2)+'px'; ring.style.height=(r.height+pad*2)+'px';
        document.body.appendChild(ring);
        const pop=document.createElement('div'); pop.className='tour-pop';
        pop.innerHTML=`<h4>${spark} ${st.title}</h4><p>${st.text}</p><div class="nav"><span class="step">${ui.tour.step+1} / ${TOUR.length}</span>${ui.tour.step>0?`<button class="btn sm" data-act="tour-prev">Back</button>`:''}<button class="btn sm" data-act="tour-skip">Skip</button><button class="btn sm accent" data-act="tour-next">${ui.tour.step===TOUR.length-1?'Done':'Next'}</button></div>`;
        document.body.appendChild(pop);
        let top=r.top+r.height+12; if(top+170>window.innerHeight) top=Math.max(12,r.top-178);
        let left=Math.min(r.left, window.innerWidth-348);
        pop.style.top=top+'px'; pop.style.left=Math.max(12,left)+'px';
      }, el?260:0);
    }, needNav?340:40);
  }
  function showTourToast(){
    if(ui.tourSeen || (ui.tour&&ui.tour.open) || document.getElementById('ttoast')) return;
    const t=document.createElement('div'); t.className='toast'; t.id='ttoast';
    t.innerHTML=`<h4>${spark} New here?</h4><p>Take a 60-second guided tour of the workspace. You can replay it anytime from the Tour button.</p><div class="row"><button class="btn sm accent" data-act="tour-start">Start tour</button><button class="btn sm" data-act="tour-later">Maybe later</button></div>`;
    document.body.appendChild(t);
  }


  /* ========== modal ========== */
  function modal(html){
    closeModal();
    const d=document.createElement("div"); d.className="modal-bg"; d.id="modal";
    d.innerHTML=`<div class="modal">${html}</div>`;
    d.addEventListener("click",e=>{ if(e.target===d) closeModal(); });
    document.body.appendChild(d);
  }
  function closeModal(){ const m=$("#modal"); if(m) m.remove(); }

  /* ========== events ========== */
  document.addEventListener("click", (e)=>{
    const row = e.target.closest("tr.click,[data-href]");
    const act = e.target.closest("[data-act]");
    if(e.target.closest("[data-nav]")) document.body.classList.remove("nav-open");
    if(act){
      const a=act.dataset.act, k=act.dataset.key, id=act.dataset.id;
      if(a==="menu"){ document.body.classList.toggle("nav-open"); return; }
      if(a==="todo"){ const t=DB.todos.find(x=>x.id===id); t.done=!t.done; render(); return; }
      if(a==="grp"){ const g=act.dataset.id; ui.openGroups[g]=!ui.openGroups[g]; render(); return; }
      if(a==="rfilter"){ if(act.dataset.k==="client") reqClient=act.dataset.v; else reqStatus=act.dataset.v; render(); return; }
      if(a==="accept"){ ui.accepted[k]=true; render(); return; }
      if(a==="edit"){ ui.editing[k]=!ui.editing[k]; render(); return; }
      if(a==="save"){ ui.editing[k]=false; ui.accepted[k]=true; render(); return; }
      if(a==="regen"){ regen(k, act); return; }
      if(a==="approve-memo"){ modal(`<div class="mh2">${icon('check')}<h3>Submitted to committee</h3><button class="x" data-act="close">${icon('x')}</button></div>
        <div class="mb2"><p class="muted">In the live product this packages the accepted memo, risk assessment, CINET report and presentation into the committee pack and routes it for approval. (Demo — no document is sent.)</p></div>
        <div class="mf"><button class="btn primary" data-act="close">Done</button></div>`); return; }
      if(a==="gen-prof"){ genProf(id, act); return; }
      if(a==="followup"){ showFollowup(id); return; }
      if(a==="lead-sel"){ leadSel[id]=!leadSel[id]; render(); return; }
      if(a==="req-clear"){ DB.leads.forEach(l=>{ if(leadSel[l.id]){ l.clearance="requested"; } }); leadSel={}; render(); return; }
      if(a==="run-clear"){ DB.leads.forEach(l=>{ if(l.clearance==="requested"){ l.clearance="cleared"; l.stage="Contacted"; } }); render(); return; }
      if(a==="ask"){ ask(+act.dataset.i); return; }
      if(a==="send-chat"){ sendChat($("#chatin").value); return; }
      if(a==="cotab"){ ui.coTab=act.dataset.tab; render(); return; }
      if(a==="pgroup"){ ui.profitScope=act.dataset.v; render(); return; }
      if(a==="tour-start"){ startTour(); return; }
      if(a==="cmd-open"){ openCmd(); return; }
      if(a==="qa"){ activityModal(id, act.dataset.type); return; }
      if(a==="qa-save"){ const f=document.getElementById('qa-field'); const ty=act.dataset.type; const dflt={call:'Call logged',note:'Note added',meeting:'Meeting logged',reminder:'Reminder set',opportunity:'Opportunity logged'}[ty]||'Logged'; logActivity(id, ty, (f&&f.value.trim())||dflt); closeModal(); ui.coTab='activity'; render(); return; }
      if(a==="nba-review"||a==="nba-remind"){ activityModal(id,'reminder'); return; }
      if(a==="nba-note"){ activityModal(id,'opportunity'); return; }
      if(a==="tour-next"){ tourGo(1); return; }
      if(a==="tour-prev"){ tourGo(-1); return; }
      if(a==="tour-skip"){ endTour(); return; }
      if(a==="tour-later"){ ui.tourSeen=true; const t=document.getElementById('ttoast'); if(t)t.remove(); return; }
      if(a==="close"){ closeModal(); return; }
    }
    if(row && row.dataset.href){
      if(e.target.closest("a,button,select,.chk")) return;
      location.hash = row.dataset.href; return;
    }
  });
  document.addEventListener("change",(e)=>{
    const sel=e.target.closest("[data-act='stage']");
    if(sel){ const l=DB.leads.find(x=>x.id===sel.dataset.id); l.stage=sel.value; render(); }
  });

  function regen(key, btn){
    const sec = document.querySelector(`[data-sec="${key}"] .sec-inner`) || (btn.closest(".ai-block")?.querySelector(".body"));
    if(!sec) return;
    const old = sec.innerHTML;
    sec.innerHTML = `<div class="gen"><span class="spin"></span> Regenerating with AI…</div>`;
    setTimeout(()=>{ sec.innerHTML = old; sec.classList.add("fade-in"); ui.accepted[key]=false; }, 1100);
  }
  function genProf(id, btn){
    const card=$("#profcard");
    card.innerHTML=`<div class="gen"><span class="spin"></span> Generating profitability & exposure tables…</div>`;
    setTimeout(()=>{ ui.generated["prof_"+id]=true; render(); }, 1200);
  }
  function showFollowup(id){
    const r=DB.requests.find(x=>x.id===id); const c=DB.byId[r.companyId];
    modal(`<div class="mh2">${spark2()}<h3>AI-drafted follow-up</h3>${aiBadge('Ready to send')}<button class="x" data-act="close">${icon('x')}</button></div>
      <div class="mb2">
        <div class="muted" style="font-size:12.5px;margin-bottom:10px">${r.id} · ${c.name} · to ${r.owner}</div>
        <div class="ai-block"><div class="body" style="white-space:pre-line;font-size:13.5px;line-height:1.7">${r.followup}</div></div>
      </div>
      <div class="mf"><button class="btn" data-act="close">Edit</button><button class="btn accent" data-act="close">${icon('send',15)} Send to coordination</button></div>`);
  }

  /* ========== NEXT-BEST-ACTION ========== */
  function nbaFor(c){
    const out=[];
    const br=c.covenants.find(v=>v.status==="breach");
    if(br) out.push({sev:"red",ic:"alert",t:"Covenant breach — schedule review",s:`${br.name}: ${br.actual} vs required ${br.req}`,action:{label:"Schedule review",act:"nba-review"}});
    const ar=DB.requests.find(r=>r.companyId===c.id&&r.atRisk&&r.status!=="Completed");
    if(ar) out.push({sev:"red",ic:"inbox",t:"Chase at-risk request",s:`${ar.id} · ${ar.type} — flagged likely to slip`,action:{label:"View AI follow-up",act:"followup",id:ar.id}});
    const od=c.documents.find(d=>d.status==="overdue");
    if(od) out.push({sev:"red",ic:"clock",t:"Overdue document",s:`${od.doc} is overdue`,action:{label:"Set reminder",act:"nba-remind"}});
    if(["review","progress","pending"].includes(c.memo.dcr)) out.push({sev:"amber",ic:"file",t:"Finalise credit package",s:"Committee memo not yet complete",action:{label:"Open memo",href:`#/memo/${c.id}`}});
    if(c.market.share<0.25) out.push({sev:"amber",ic:"target",t:"Grow share of wallet",s:`Only ${Math.round(c.market.share*100)}% of ~${fmt(c.market.total.util)} market exposure — headroom to grow`,action:{label:"Log opportunity",act:"nba-note"}});
    if(c.kyc.status!=="Current") out.push({sev:"amber",ic:"users",t:"KYC refresh due",s:"Periodic review outstanding",action:{label:"Set reminder",act:"nba-remind"}});
    return out;
  }
  function nbaBtn(it,c){ const a=it.action; if(!a) return '';
    return a.href?`<a class="btn sm accent" href="${a.href}">${a.label}</a>`
      :`<button class="btn sm accent" data-act="${a.act}" data-id="${a.id||c.id}">${a.label}</button>`; }
  function nbaRowHTML(it,c,withClient){
    return `<div class="nba"><div class="nic" style="background:var(--${it.sev}-bg);color:var(--${it.sev})">${icon(it.ic,16)}</div>
      <div class="ntx"><div class="nt">${it.t}${withClient?` · <a class="linklike" href="#/company/${c.id}">${c.name}</a>`:''}</div>
        <div class="ns">${it.s}</div><div class="act">${nbaBtn(it,c)}</div></div></div>`;
  }
  function nbaCard(c){ const items=nbaFor(c); if(!items.length) return '';
    return `<div class="card"><div class="ch">${spark2()}<h3>Recommended next actions</h3><span class="pill ai">${items.length}</span></div>
      <div class="cb flush">${items.map(it=>nbaRowHTML(it,c,false)).join("")}</div></div>`; }
  function portfolioNBA(){ const rows=[]; DB.companies.forEach(c=>nbaFor(c).forEach(it=>rows.push({c,it})));
    rows.sort((a,b)=>(a.it.sev==='red'?0:1)-(b.it.sev==='red'?0:1)); return rows; }

  /* ========== ACTIVITY / CALL LOG ========== */
  function defaultTimeline(c){
    const fac=c.facilities[0];
    return [
      {type:"call", text:`AI call summary — reviewed the ${fac.type.toLowerCase()} and pricing; client comfortable with terms, to revert on covenants.`, when:"2 days ago"},
      {type:"note", text:"FY2025 audited financials received and spread into the model.", when:"1 week ago"},
      {type:"meeting", text:`Quarterly relationship review held with ${c.parent?'group':'company'} CFO.`, when:"3 weeks ago"},
    ];
  }
  function coActivity(c){
    const icmap={call:"phone",note:"edit",meeting:"users",reminder:"clock",opportunity:"target"};
    const acts=(ui.activity[c.id]||[]).concat(defaultTimeline(c));
    return `<div class="card"><div class="ch">${icon('clock')}<h3>Activity & relationship log</h3>${aiBadge('Auto-logged')}
        <div class="right faint" style="font-size:12px">Calls, notes & meetings — captured for you</div></div>
      <div class="cb">
        <div class="qa-bar">
          <button class="btn sm" data-act="qa" data-type="call" data-id="${c.id}">${icon('phone',14)} Log call</button>
          <button class="btn sm" data-act="qa" data-type="note" data-id="${c.id}">${icon('edit',14)} Add note</button>
          <button class="btn sm" data-act="qa" data-type="meeting" data-id="${c.id}">${icon('users',14)} Log meeting</button>
          <button class="btn sm" data-act="qa" data-type="reminder" data-id="${c.id}">${icon('clock',14)} Set reminder</button>
        </div>
        <div class="divider"></div>
        <div class="tl">${acts.map(a=>`<div class="tl-item"><div class="tl-ic">${icon(icmap[a.type]||'edit',15)}</div>
          <div class="tl-tx"><div class="tt">${a.text}</div><div class="tm">${a.when[0].toUpperCase()+a.when.slice(1)}${ui.activity[c.id]&&ui.activity[c.id].includes(a)?' · you':''}</div></div></div>`).join("")}</div>
      </div></div>`;
  }
  function logActivity(cid,type,text){ (ui.activity[cid]=ui.activity[cid]||[]).unshift({type,text,when:"just now"}); }
  function activityModal(cid,type){
    const titles={call:"Log a call",note:"Add a note",meeting:"Log a meeting",reminder:"Set a reminder",opportunity:"Log an opportunity"};
    const ph={call:"What did you discuss? The assistant will summarise it into the log.",note:"Add your note…",meeting:"Meeting notes & attendees…",reminder:"What to follow up on — and when.",opportunity:"Describe the cross-sell / wallet-share opportunity."};
    const ic={call:"phone",note:"edit",meeting:"users",reminder:"clock",opportunity:"target"}[type]||"edit";
    modal(`<div class="mh2">${icon(ic)}<h3>${titles[type]||'Add'}</h3><button class="x" data-act="close">${icon('x')}</button></div>
      <div class="mb2"><div class="muted" style="font-size:12.5px;font-weight:600">${DB.byId[cid].name}</div>
        <textarea class="field" id="qa-field" rows="4" placeholder="${ph[type]||''}"></textarea></div>
      <div class="mf"><button class="btn" data-act="close">Cancel</button>
        <button class="btn accent" data-act="qa-save" data-id="${cid}" data-type="${type}">${icon('check',15)} Save to log</button></div>`);
    setTimeout(()=>{const f=document.getElementById('qa-field'); if(f) f.focus();},60);
  }

  /* ========== COMMAND PALETTE (Cmd/Ctrl-K) ========== */
  function openCmd(){ ui.cmd={open:true,q:"",sel:0,flat:[]};
    const bg=document.createElement('div'); bg.className='cmdk-bg'; bg.id='cmdk';
    bg.innerHTML=`<div class="cmdk">
      <div class="cin">${icon('search')}<input id="cmd-in" placeholder="Search clients, pages, actions…" autocomplete="off"/><kbd>Esc</kbd></div>
      <div class="list" id="cmd-list"></div>
      <div class="foot"><span><kbd>↑</kbd><kbd>↓</kbd> navigate</span><span><kbd>↵</kbd> open</span><span><kbd>⌘K</kbd> toggle</span></div>
    </div>`;
    bg.addEventListener('click',e=>{ if(e.target===bg) closeCmd(); });
    document.body.appendChild(bg);
    const inp=document.getElementById('cmd-in');
    inp.addEventListener('input',()=>{ ui.cmd.q=inp.value; ui.cmd.sel=0; renderCmdList(); });
    inp.focus(); renderCmdList();
  }
  function closeCmd(){ ui.cmd.open=false; const b=document.getElementById('cmdk'); if(b) b.remove(); }
  function cmdGroups(){
    const q=(ui.cmd.q||'').toLowerCase().trim();
    const pages=[['Dashboard','#/dashboard','home'],['Portfolio Analytics','#/analytics','chart'],['Request Tracker','#/requests','inbox'],['Case Tracker','#/cases','layers'],['Leads','#/leads','target'],['Watchlist','#/watchlist','alert'],['RM Assistant','#/assistant','spark']];
    const clients=DB.companies.filter(c=>!q||c.name.toLowerCase().includes(q)||(c.group||'').toLowerCase().includes(q)||c.cr.toLowerCase().includes(q))
      .slice(0,7).map(c=>({ic:'building',t:c.name,s:(c.group||'Standalone')+' · '+c.cr,run:()=>{location.hash='#/company/'+c.id;}}));
    const pg=pages.filter(p=>!q||p[0].toLowerCase().includes(q)).map(p=>({ic:p[2],t:p[0],s:'Go to page',run:()=>{location.hash=p[1];}}));
    const actions=[{ic:'spark',t:'Take the guided tour',s:'Action',run:()=>{closeCmd();startTour();}}].filter(a=>!q||a.t.toLowerCase().includes(q));
    const g=[];
    if(clients.length) g.push({label:'Clients',items:clients});
    if(pg.length) g.push({label:'Go to',items:pg});
    if(actions.length) g.push({label:'Actions',items:actions});
    return g;
  }
  function renderCmdList(){
    const g=cmdGroups(); ui.cmd.flat=[]; g.forEach(gr=>gr.items.forEach(it=>ui.cmd.flat.push(it)));
    if(ui.cmd.sel>=ui.cmd.flat.length) ui.cmd.sel=Math.max(0,ui.cmd.flat.length-1);
    let i=-1;
    const html=g.map(gr=>`<div class="grp">${gr.label}</div>`+gr.items.map(it=>{ i++; const idx=i;
      return `<div class="it ${idx===ui.cmd.sel?'sel':''}" data-cmd="${idx}"><div class="cic">${icon(it.ic,15)}</div><div class="ctx"><div class="ct">${it.t}</div><div class="cs">${it.s}</div></div></div>`;
    }).join("")).join("");
    const list=document.getElementById('cmd-list');
    list.innerHTML=html||`<div class="empty">No matches</div>`;
    list.querySelectorAll('[data-cmd]').forEach(el=>el.addEventListener('click',()=>cmdRun(+el.dataset.cmd)));
  }
  function cmdMove(d){ if(!ui.cmd.flat.length) return; ui.cmd.sel=(ui.cmd.sel+d+ui.cmd.flat.length)%ui.cmd.flat.length; renderCmdSel(); }
  function renderCmdSel(){ const list=document.getElementById('cmd-list'); if(!list) return;
    list.querySelectorAll('[data-cmd]').forEach(el=>el.classList.toggle('sel',+el.dataset.cmd===ui.cmd.sel));
    const sel=list.querySelector('.it.sel'); if(sel) sel.scrollIntoView({block:'nearest'}); }
  function cmdRun(i){ const it=ui.cmd.flat[i]; if(!it) return; const r=it.run; closeCmd(); r(); }

  document.addEventListener('keydown',(e)=>{
    if((e.metaKey||e.ctrlKey)&&(e.key==='k'||e.key==='K')){ e.preventDefault(); ui.cmd.open?closeCmd():openCmd(); return; }
    if(ui.cmd.open){
      if(e.key==='Escape'){ closeCmd(); }
      else if(e.key==='ArrowDown'){ e.preventDefault(); cmdMove(1); }
      else if(e.key==='ArrowUp'){ e.preventDefault(); cmdMove(-1); }
      else if(e.key==='Enter'){ e.preventDefault(); cmdRun(ui.cmd.sel); }
    }
  });


  /* ---------- boot ---------- */
  shell();
  window.addEventListener("hashchange", render);
  render();
})();

</script>
</body>
</html>
